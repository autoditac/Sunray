# Sunray Docker Compose (legacy — prefer Podman/Quadlet)
#
# Deploy to mower:
#   scp docker-compose.yml <mower>:~/sunray/docker-compose.yml
#   ssh <mower> "cd ~/sunray && docker compose pull && docker compose up -d"
#
# Replace GITHUB_USER below with your personal GitHub username.

services:
  sunray:
    image: ghcr.io/GITHUB_USER/sunray:latest
    container_name: sunray
    restart: unless-stopped
    privileged: true
    network_mode: host
    volumes:
      - sunray-data:/opt/sunray/data
    environment:
      - TZ=Europe/Copenhagen

volumes:
  sunray-data:
