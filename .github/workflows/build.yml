name: Build Sunray Docker Images

on:
  push:
    branches: [main]
    tags: ['*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/sunray

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAGS="$REGISTRY/$IMAGE:${{ github.sha }}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS,$REGISTRY/$IMAGE:$VERSION,$REGISTRY/$IMAGE:latest"
            echo "firmware_sha=" >> "$GITHUB_OUTPUT"
          else
            TAGS="$TAGS,$REGISTRY/$IMAGE:alpha"
            echo "firmware_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            FIRMWARE_SHA=${{ steps.tags.outputs.firmware_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
