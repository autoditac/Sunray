name: Build Sunray Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mower:
          - name: robin
            config: configs/robin.h
          - name: batman
            config: configs/batman.h
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: CONFIG_FILE=${{ matrix.mower.config }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/sunray-${{ matrix.mower.name }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/sunray-${{ matrix.mower.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.mower.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.mower.name }}
